spring:
  datasource:
    url: ${MEDILINK_DB_URL:jdbc:mysql://localhost:3306/medilink?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MEDILINK_DB_USERNAME:medilink}
    password: ${MEDILINK_DB_PASSWORD:medilink}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: Existing HAM-8 schema
    validate-on-migrate: true
    clean-disabled: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
